<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    
    <!-- Title و Meta دقیقاً با پیشنهاد بات جایگزین شد تا خطای Language رفع شود -->
    <title>DrSite Intelligent System Enterprise SEO Audit</title>
    <meta name="description" content="DrSite Intelligent System provides comprehensive Enterprise SEO Audits, Core Web Vitals optimization, and server performance analysis.">
    <link rel="canonical" href="https://drsite.github.io/">

    <!-- اسکیما مارکاپ که با موفقیت Pass شد -->
    <script type="application/ld+json">
    [
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "DrSite",
        "url": "https://drsite.github.io/"
      },
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "DrSite",
        "url": "https://drsite.github.io/"
      },
      {
        "@context": "https://schema.org",
        "@type": "Article",
        "headline": "Enterprise SEO Audit System",
        "author": {"@type": "Organization", "name": "DrSite"},
        "publisher": {"@type": "Organization", "name": "DrSite"},
        "datePublished": "2026-01-01"
      }
    ]
    </script>

    <style>
        /* قالب دارک‌مد اصلی شما */
        :root {
            --bg-main: #0b0f19;
            --bg-card: #111827;
            --primary: #38bdf8;
            --primary-hover: #0ea5e9;
            --text-title: #f8fafc;
            --text-body: #94a3b8;
            --border: #1f2937;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            background-color: var(--bg-main);
            color: var(--text-body);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            text-align: left;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            padding: 50px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            color: var(--text-title);
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0 0 12px 0;
        }

        .tagline {
            color: var(--primary);
            font-size: 1.1rem;
            margin: 0;
            font-weight: 500;
        }

        .search-box-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            margin-bottom: 35px;
        }

        .form-group {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }

        input[type="url"] {
            flex: 1;
            background-color: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 20px;
            color: var(--text-title);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="url"]:focus { border-color: var(--primary); }

        .btn-scan {
            background-color: var(--primary);
            color: #0b0f19;
            border: none;
            border-radius: 8px;
            padding: 0 30px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-scan:hover { background-color: var(--primary-hover); }

        /* جایگاهی که اسکریپت شما باید نتایج واقعی را در آن رندر کند */
        #scanResults {
            margin-top: 30px;
            min-height: 50px;
        }
    </style>
</head>
<body>

    <main class="container">
        <header>
            <h1>DrSite Intelligent System</h1>
            <p class="tagline">Enterprise SEO Audit & Telemetry</p>
        </header>

        <section class="search-box-card">
            <h2 style="color: var(--text-title); font-size: 1.25rem; margin-top: 0;">Instant SEO Analysis</h2>
            <p style="font-size: 0.9rem; margin: 5px 0 15px 0;">Enter your target domain to evaluate Core Web Vitals and Lighthouse metrics:</p>
            
            <!-- فرم آماده برای اتصال مجدد به اسکریپت/بک‌اند شما -->
            <form id="seoAuditForm">
                <div class="form-group">
                    <input type="url" id="domainInput" placeholder="https://example.com" required>
                    <button type="submit" class="btn-scan">شروع آنالیز فنی</button>
                </div>
            </form>
            
            <!-- نتایج باید با جاوااسکریپت در این بخش تزریق شوند -->
            <div id="scanResults"></div>
        </section>
    </main>

</body>
</html>
