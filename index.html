<!doctype html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>دکتر سایت | آنالیز سئو و تله‌متری</title>
<meta name="description" content="آنالیز جامع عملکرد وب‌سایت، Core Web Vitals و تله‌متری سرور.">
<link rel="canonical" href="https://drsite.github.io/">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="image" href="/assets/hero-800.webp" imagesrcset="/assets/hero-400.webp 400w, /assets/hero-800.webp 800w" fetchpriority="high">
<link rel="preload" as="font" href="/fonts/inter-var.woff2" type="font/woff2" crossorigin>
<style>
:root{--bg:#0b0f19;--card:#111827;--primary:#38bdf8;--text:#f8fafc;--lock:#ef4444}
body{background:var(--bg);color:var(--text);font-family:Inter, 'Segoe UI', Tahoma, sans-serif;margin:0;padding:20px;line-height:1.6}
.container{max-width:900px;margin:auto}
.card{background:var(--card);padding:32px;border-radius:16px;border:1px solid #1f2937;margin-bottom:24px}
input,button{font-size:1rem}
img{max-width:100%;height:auto;display:block}
.visually-hidden{position:absolute!important;height:1px;width:1px;overflow:hidden;clip:rect(1px,1px,1px,1px)}
</style>

<!-- JSON-LD Schema -->
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"Organization","name":"دکتر سایت","url":"https://drsite.github.io","sameAs":["https://t.me/DrSiteOfficial","https://instagram.com/DrSite.Official"],"contactPoint":[{"@type":"ContactPoint","email":"support@drsite.io","contactType":"customer support","inLanguage":"fa"}]}
</script>
</head>
<body>
<main class="container" id="main">
  <header class="card" role="banner">
    <h1>سامانه پردازش تخصصی دکتر سایت</h1>
    <p class="visually-hidden">بهینه‌سازی سئو و مانیتورینگ تله‌متری</p>
  </header>

  <section class="card" aria-labelledby="contactTitle">
    <h2 id="contactTitle">ارتباط با تیم فنی</h2>
    <nav>
      <ul>
        <li><a href="https://t.me/DrSite" target="_blank" rel="noopener">کانال تلگرام</a></li>
        <li><a href="https://t.me/DrSiteOfficial" target="_blank" rel="noopener">@DrSiteOfficial</a></li>
        <li><a href="https://instagram.com/DrSite.Official" target="_blank" rel="noopener">اینستاگرام</a></li>
        <li><a href="mailto:support@drsite.io">support@drsite.io</a></li>
      </ul>
    </nav>
  </section>

  <section class="card" aria-labelledby="scanTitle">
    <h2 id="scanTitle">اسکن و آنالیز</h2>
    <form id="auditForm" aria-describedby="scanDesc">
      <label for="urlInput" class="visually-hidden">آدرس سایت برای اسکن</label>
      <input id="urlInput" name="url" type="text" placeholder="drsite.github.io" required aria-required="true">
      <button type="submit">شروع اسکن رایگان</button>
    </form>
    <p id="scanDesc">نتایج اولیه رایگان؛ گزارش کامل در نسخهٔ پیشرفته نمایش داده می‌شود.</p>
  </section>

  <section id="results" class="card" style="display:none" aria-live="polite"></section>
</main>

<script>
document.getElementById('auditForm').onsubmit = function(e){
  e.preventDefault();
  const r=document.getElementById('results');
  r.style.display='block';
  r.innerHTML='<h3>نتایج آنالیز اولیه (رایگان)</h3><p>در حال پردازش...</p>';
  r.scrollIntoView({behavior:'smooth'});
};
// Lazy load non-LCP images
if('loading' in HTMLImageElement.prototype){
  document.querySelectorAll('img[data-lazy]').forEach(i=>i.loading='lazy');
}
</script>
</body>
</html>
